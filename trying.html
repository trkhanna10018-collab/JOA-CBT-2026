<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Mock Test</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6366f1,#9333ea);
}

/* HEADER */
.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
color:white;
}

/* CARD */
.card{
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* BUTTON */
button{
background:#6366f1;
color:white;
border:none;
padding:12px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

/* OPTION */
.option{
display:block;
padding:10px;
margin:8px 0;
background:#f3f4f6;
border-radius:8px;
cursor:pointer;
}

/* TIMER */
.timer{
text-align:center;
font-size:20px;
font-weight:bold;
margin:10px;
color:white;
}

</style>

</head>

<body>

<div class="header" id="testTitle"></div>

<div class="timer" id="timer" style="display:none"></div>

<div class="card" id="formBox">
<h3>Enter Details</h3>
<input id="name" placeholder="Enter Name">
<input id="phone" placeholder="Enter Phone">
<button onclick="startCountdown()">Start Test</button>
</div>

<div class="card" id="countBox" style="display:none;text-align:center">
<h2>Starting in</h2>
<h1 id="count">5</h1>
</div>

<div class="card" id="questionBox" style="display:none"></div>

<div class="card" id="resultBox" style="display:none"></div>

<script>

/* 🔥 CHANGE ONLY THIS */
let mockTestNo = "Mock Test 1"

document.getElementById("testTitle").innerText = mockTestNo

/* QUESTIONS */
let questions=[
{
en:"Which aggregate function calculates average?",
hi:"कौन-सा function average निकालता है?",
A:"SUM()",
B:"AVG()",
C:"COUNT()",
D:"MAX()",
ans:"B"
},
{
en:"Which SQL clause groups rows?",
hi:"Rows को group करने के लिए?",
A:"ORDER BY",
B:"GROUP BY",
C:"WHERE",
D:"HAVING",
ans:"B"
}
]

let current=0
let score=0
let userAnswers={}

let name=""
let phone=""

let time=20
let timerInterval

function startCountdown(){

name=document.getElementById("name").value
phone=document.getElementById("phone").value

if(name=="" || phone==""){
alert("Enter details")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let c=setInterval(()=>{
document.getElementById("count").innerHTML=t
t--

if(t<0){
clearInterval(c)

document.getElementById("countBox").style.display="none"
document.getElementById("questionBox").style.display="block"
document.getElementById("timer").style.display="block"

startTimer()
showQuestion()
}

},1000)
}

function startTimer(){
timerInterval=setInterval(()=>{
let m=Math.floor(time/60)
let s=time%60
document.getElementById("timer").innerHTML="⏱ "+m+":"+(s<10?"0":"")+s
time--

if(time<0){
clearInterval(timerInterval)
showResult()
}
},1000)
}

function showQuestion(){

let q=questions[current]

let html=""

html+=`<div style="margin-bottom:10px;">
<b>${name}</b> | ${phone}<br>
<b>${mockTestNo}</b>
</div>`

html+=`<h3>Q${current+1}/${questions.length}. ${q.en}</h3>`
html+=`<p>${q.hi}</p>`

html+=`<label class="option"><input type="radio" name="ans" value="A"> A. ${q.A}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="B"> B. ${q.B}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="C"> C. ${q.C}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="D"> D. ${q.D}</label>`

html+=`<br><button onclick="nextQuestion()">Next</button>`

document.getElementById("questionBox").innerHTML=html
}

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){
userAnswers[current]=selected.value
if(selected.value==questions[current].ans){
score++
}
}

current++

if(current<questions.length){
showQuestion()
}else{
showResult()
}
}

function showResult(){

clearInterval(timerInterval)

document.getElementById("questionBox").style.display="none"

let box=document.getElementById("resultBox")
box.style.display="block"

let html=""

html+=`<h2>RESULT</h2>`
html+=`<b>Name:</b> ${name}<br>`
html+=`<b>Phone:</b> ${phone}<br>`
html+=`<b>Test:</b> ${mockTestNo}<br>`
html+=`<b>Score:</b> ${score}/${questions.length}<br><br>`

questions.forEach((q,i)=>{
html+=`<hr>`
html+=`<b>Q${i+1}. ${q.en}</b><br>`
html+=`${q.hi}<br><br>`
html+=`A. ${q.A}<br>`
html+=`B. ${q.B}<br>`
html+=`C. ${q.C}<br>`
html+=`D. ${q.D}<br><br>`
html+=`Your Answer: ${userAnswers[i] || "Not Attempted"}<br>`
html+=`Correct Answer: ${q.ans}<br>`
})

html+=`<br><button onclick="downloadPDF()">Download PDF</button>`

box.innerHTML=html
}

async function downloadPDF(){

const { jsPDF } = window.jspdf

let element = document.getElementById("resultBox")

element.style.background = "#ffffff"
element.style.color = "#000"

await new Promise(resolve => setTimeout(resolve, 800))

let canvas = await html2canvas(element,{scale:3})

let imgData = canvas.toDataURL("image/png")

let pdf = new jsPDF("p","mm","a4")

let imgWidth=190
let imgHeight=canvas.height*imgWidth/canvas.width

pdf.addImage(imgData,"PNG",10,10,imgWidth,imgHeight)

pdf.save("Mock_"+mockTestNo.replace(/\s+/g,'_')+".pdf")
}

</script>

</body>
</html>
