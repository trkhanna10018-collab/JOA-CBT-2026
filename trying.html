let current=0
let score=0
let userAnswers={}

let name=""
let phone=""

let time=20
let timerInterval

function startCountdown(){

name=document.getElementById("name").value
phone=document.getElementById("phone").value

if(name=="" || phone==""){
alert("Enter details")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let c=setInterval(()=>{
document.getElementById("count").innerHTML=t
t--

if(t<0){
clearInterval(c)

document.getElementById("countBox").style.display="none"
document.getElementById("questionBox").style.display="block"
document.getElementById("timer").style.display="block"

startTimer()
showQuestion()
}

},1000)
}

function startTimer(){
timerInterval=setInterval(()=>{
let m=Math.floor(time/60)
let s=time%60
document.getElementById("timer").innerHTML="⏱ "+m+":"+(s<10?"0":"")+s
time--

if(time<0){
clearInterval(timerInterval)
showResult()
}
},1000)
}

function showQuestion(){

let q=questions[current]

let html=""

html+=`<b>Name:</b> ${name}<br>`
html+=`<b>Phone:</b> ${phone}<br>`
html+=`<b>Test:</b> ${mockNo}<br><br>`

html+=`<h3>Q${current+1}. ${q.en}</h3>`
html+=`<p>${q.hi}</p>`

html+=`<label class="option"><input type="radio" name="ans" value="A"> A. ${q.A}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="B"> B. ${q.B}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="C"> C. ${q.C}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="D"> D. ${q.D}</label>`

html+=`<br><button onclick="nextQuestion()">Next</button>`

document.getElementById("questionBox").innerHTML=html
}

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){
userAnswers[current]=selected.value
if(selected.value==questions[current].ans){
score++
}
}

current++

if(current<questions.length){
showQuestion()
}else{
showResult()
}
}

function showResult(){

clearInterval(timerInterval)

document.getElementById("questionBox").style.display="none"

let box=document.getElementById("resultBox")
box.style.display="block"

let html=""

html+=`<h2>RESULT</h2>`
html+=`<b>Name:</b> ${name}<br>`
html+=`<b>Phone:</b> ${phone}<br>`
html+=`<b>Test:</b> ${mockNo}<br>`
html+=`<b>Score:</b> ${score}/${questions.length}<br><br>`

questions.forEach((q,i)=>{
html+=`<hr>`
html+=`<b>Q${i+1}. ${q.en}</b><br>`
html+=`${q.hi}<br><br>`
html+=`A. ${q.A}<br>`
html+=`B. ${q.B}<br>`
html+=`C. ${q.C}<br>`
html+=`D. ${q.D}<br><br>`
html+=`Your Answer: ${userAnswers[i] || "Not Attempted"}<br>`
html+=`Correct Answer: ${q.ans}<br>`
})

html+=`<br><button onclick="downloadPDF()">Download PDF</button>`

box.innerHTML=html
}

async function downloadPDF(){

const { jsPDF } = window.jspdf

let element = document.getElementById("resultBox")

element.style.background = "#ffffff"
element.style.color = "#000"

await new Promise(resolve => setTimeout(resolve, 1000))

let canvas = await html2canvas(element, {
scale:3,
useCORS:true,
scrollY:-window.scrollY
})

let imgData = canvas.toDataURL("image/png")

let pdf = new jsPDF("p","mm","a4")

let imgWidth = 190
let imgHeight = canvas.height * imgWidth / canvas.width

pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight)

// file name clean
pdf.save("Mock_"+mockNo.replace(/\s+/g,'_')+"_Result.pdf")
}

</script>
