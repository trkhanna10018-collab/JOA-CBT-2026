<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h3{
margin-bottom:25px;
color:#333;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#667eea,#764ba2);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container">
<h3>Login to Access Mock Tests</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

// ✅ 3 USERS
if(
(u=="user1" && p=="123") ||
(u=="user2" && p=="123") ||
(u=="user3" && p=="123")
){
localStorage.setItem("mockLogin","yes")
window.location.href="index.html"
}
else{
alert("Wrong Username or Password")
}

}

</script>

</body>
</html>
