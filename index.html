<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>HP JOA IT Mock Tests</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:auto;
background:white;
margin-top:40px;
padding:30px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
text-align:center;
}

button{
padding:12px 25px;
margin:8px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{background:#0056b3}

.question{display:none}

.review{
background:#f2f2f2;
padding:10px;
margin-top:15px;
}

</style>

<script>

let name=""
let phone=""
let current=1
let score=0
let testNumber=0

let questions={
1:[
{q:"Which memory stores BIOS?",A:"RAM",B:"ROM",C:"Cache",D:"Register",ans:"B"},
{q:"Which device is optical storage?",A:"SSD",B:"DVD",C:"Flash Drive",D:"Hard Disk",ans:"B"},
{q:"Which OS component manages hardware communication?",A:"Kernel",B:"Shell",C:"Compiler",D:"Interpreter",ans:"A"}
],

2:[
{q:"What is time complexity of binary search?",A:"O(n)",B:"O(log n)",C:"O(n2)",D:"O(1)",ans:"B"},
{q:"Which layer handles routing?",A:"Network",B:"Transport",C:"Session",D:"Data Link",ans:"A"},
{q:"Which protocol sends email?",A:"HTTP",B:"FTP",C:"SMTP",D:"SNMP",ans:"C"}
]
}

for(let i=3;i<=15;i++){
questions[i]=questions[1]
}

let userAnswers={}

function openTests(){

document.getElementById("home").style.display="none"
document.getElementById("testList").style.display="block"

}

function startTest(num){

testNumber=num

document.getElementById("testList").style.display="none"
document.getElementById("formBox").style.display="block"

}

function begin(){

name=document.getElementById("name").value
phone=document.getElementById("phone").value

document.getElementById("formBox").style.display="none"
document.getElementById("q1").style.display="block"

loadQuestion()

}

function loadQuestion(){

let q=questions[testNumber][current-1]

document.getElementById("qText").innerHTML=current+". "+q.q

document.getElementById("optA").innerHTML=q.A
document.getElementById("optB").innerHTML=q.B
document.getElementById("optC").innerHTML=q.C
document.getElementById("optD").innerHTML=q.D

}

function next(){

let sel=document.querySelector('input[name="opt"]:checked')

if(sel){

userAnswers[current]=sel.value

if(sel.value==questions[testNumber][current-1].ans){
score++
}

}

current++

if(current<=3){

loadQuestion()
document.querySelectorAll('input[name="opt"]').forEach(r=>r.checked=false)

}else{

showResult()

}

}

function showResult(){

document.getElementById("q1").style.display="none"
document.getElementById("resultBox").style.display="block"

document.getElementById("score").innerHTML="Score : "+score+"/3"

let review=""

for(let i=1;i<=3;i++){

let q=questions[testNumber][i-1]

review+=`
<div class="review">

<b>Q${i}: ${q.q}</b><br>

A: ${q.A}<br>
B: ${q.B}<br>
C: ${q.C}<br>
D: ${q.D}<br><br>

Your Answer : ${userAnswers[i]||"Not Attempted"}<br>
Correct Answer : ${q.ans}

</div>
`

}

document.getElementById("review").innerHTML=review

}

function downloadPDF(){

const { jsPDF } = window.jspdf
let doc=new jsPDF()

doc.text("Mock Test Result",20,20)
doc.text("Name : "+name,20,30)
doc.text("Phone : "+phone,20,40)
doc.text("Score : "+score+"/3",20,50)

doc.save("result.pdf")

}

</script>

</head>

<body>

<div class="container" id="home">

<h1>Himachal Pradesh</h1>
<h2>JOA (IT) 2026 Preparation Portal</h2>

<br>

<button onclick="openTests()">JOA (IT) 2026 MOCK TEST</button>

</div>

<div class="container" id="testList" style="display:none">

<h2>Select Mock Test</h2>

<script>

for(let i=1;i<=15;i++){
document.write(`<button onclick="startTest(${i})">Mock Test ${i}</button>`)
}

</script>

</div>

<div class="container" id="formBox" style="display:none">

<h3>Candidate Details</h3>

Name<br>
<input type="text" id="name"><br><br>

Phone<br>
<input type="text" id="phone"><br><br>

<button onclick="begin()">Start Test</button>

</div>

<div class="container question" id="q1">

<p id="qText"></p>

<input type="radio" name="opt" value="A"> <span id="optA"></span><br>
<input type="radio" name="opt" value="B"> <span id="optB"></span><br>
<input type="radio" name="opt" value="C"> <span id="optC"></span><br>
<input type="radio" name="opt" value="D"> <span id="optD"></span><br><br>

<button onclick="next()">Next</button>

</div>

<div class="container" id="resultBox" style="display:none">

<h2 id="score"></h2>

<div id="review"></div>

<br>

<button onclick="downloadPDF()">Download PDF</button>

</div>

</body>

</html>
