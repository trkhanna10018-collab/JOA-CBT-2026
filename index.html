<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>HP JOA IT Mock Tests</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f4ff;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:auto;
background:white;
margin-top:40px;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.center{text-align:center}

button{
background:#2a63ff;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1c46b8;
}

.question{
display:none;
}

.options{
text-align:left;
margin-top:10px;
}

.timer{
font-size:28px;
font-weight:bold;
color:red;
}

.review{
background:#f4f4f4;
padding:15px;
margin-top:15px;
border-radius:5px;
}

</style>

<script>

let name=""
let phone=""
let current=1
let score=0

let userAnswers={}

let questions=[

{q:"Which memory is used to store BIOS in a computer?",A:"RAM",B:"ROM",C:"Cache",D:"Register",ans:"B"},

{q:"Which of the following is an example of an optical storage device?",A:"SSD",B:"DVD",C:"Flash Drive",D:"Hard Disk",ans:"B"},

{q:"Which operating system component manages communication between hardware and software?",A:"Kernel",B:"Shell",C:"Compiler",D:"Interpreter",ans:"A"},

{q:"Which scheduling algorithm assigns CPU to the process with the smallest execution time?",A:"Round Robin",B:"FCFS",C:"Shortest Job First",D:"Priority Scheduling",ans:"C"},

{q:"Which network topology connects each node directly to every other node?",A:"Bus",B:"Star",C:"Mesh",D:"Ring",ans:"C"}

]

/* ------------ HOME PAGE ------------- */

function openTests(){

document.getElementById("home").style.display="none"
document.getElementById("testList").style.display="block"

}

/* ------------ START TEST ------------- */

function startTest(){

document.getElementById("testList").style.display="none"
document.getElementById("formBox").style.display="block"

}

/* ------------ BEGIN AFTER FORM ------------- */

function begin(){

name=document.getElementById("name").value
phone=document.getElementById("phone").value

if(name=="" || phone==""){

alert("Enter name and phone")
return

}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let timer=setInterval(function(){

document.getElementById("count").innerHTML=t

t--

if(t<0){

clearInterval(timer)

document.getElementById("countBox").style.display="none"

showQuestion()

}

},1000)

}

/* ------------ SHOW QUESTION ------------- */

function showQuestion(){

let q=questions[current-1]

let html=""

html+="<h3>Q"+current+". "+q.q+"</h3>"

html+='<div class="options">'

html+='<label><input type="radio" name="q" value="A"> A. '+q.A+'</label><br>'
html+='<label><input type="radio" name="q" value="B"> B. '+q.B+'</label><br>'
html+='<label><input type="radio" name="q" value="C"> C. '+q.C+'</label><br>'
html+='<label><input type="radio" name="q" value="D"> D. '+q.D+'</label><br>'

html+="</div><br>"

html+='<button onclick="next()">Next</button>'

document.getElementById("questionBox").innerHTML=html

document.getElementById("questionBox").style.display="block"

}

/* ------------ NEXT QUESTION ------------- */

function next(){

let q=document.querySelector('input[name="q"]:checked')

if(q){

userAnswers[current]=q.value

if(q.value==questions[current-1].ans){

score++

}

}

current++

if(current<=questions.length){

showQuestion()

}

else{

showResult()

}

}

/* ------------ RESULT ------------- */

function showResult(){

document.getElementById("questionBox").style.display="none"

document.getElementById("resultBox").style.display="block"

document.getElementById("score").innerHTML="Score : "+score+" / "+questions.length

}

/* ------------ PDF ------------- */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let y=20

doc.text("HP JOA IT MOCK TEST RESULT",20,y)
y+=10

doc.text("Name : "+name,20,y)
y+=8

doc.text("Phone : "+phone,20,y)
y+=8

doc.text("Score : "+score+"/"+questions.length,20,y)

y+=12

for(let i=0;i<questions.length;i++){

let q=questions[i]

doc.text("Q"+(i+1)+": "+q.q,20,y)
y+=8

doc.text("A. "+q.A,25,y)
y+=6

doc.text("B. "+q.B,25,y)
y+=6

doc.text("C. "+q.C,25,y)
y+=6

doc.text("D. "+q.D,25,y)
y+=6

doc.text("Your Answer : "+(userAnswers[i+1] || "Not Attempted"),25,y)
y+=6

doc.text("Correct Answer : "+q.ans,25,y)

y+=10

if(y>270){

doc.addPage()

y=20

}

}

doc.save("result.pdf")

}

</script>

</head>

<body>

<div class="container center" id="home">

<h2>HP JOA (IT) MOCK TEST PORTAL</h2>

<br>

<button onclick="openTests()">JOA (IT) 2026 MOCK TEST</button>

</div>

<div class="container center" id="testList" style="display:none">

<h3>Select Mock Test</h3>

<button onclick="startTest()">Mock Test 01</button>

</div>

<div class="container" id="formBox" style="display:none">

<h3>Candidate Details</h3>

Name<br>
<input type="text" id="name"><br><br>

Phone<br>
<input type="text" id="phone"><br><br>

<button onclick="begin()">Start Test</button>

</div>

<div class="container center" id="countBox" style="display:none">

<h3>Test will start in</h3>

<div class="timer" id="count">5</div>

</div>

<div class="container" id="questionBox" style="display:none"></div>

<div class="container center" id="resultBox" style="display:none">

<h2 id="score"></h2>

<br>

<button onclick="downloadPDF()">Download Result PDF</button>

</div>

</body>
</html>
